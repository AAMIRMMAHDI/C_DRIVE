<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ورود - فضای ابری</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://v1.fontapi.ir/css/Vazir">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        * {
            font-family: 'Vazir', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
            height: 100vh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a, #1e1e2f);
            min-height: 100vh;
            width: 100%;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        .glass-button {
            background: rgba(79, 195, 247, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.4);
            color: #4fc3f7;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .glass-button:hover {
            background: rgba(79, 195, 247, 0.3);
            transform: translateY(-2px);
        }
        .form-field {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideIn 0.3s ease forwards;
        }
        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 640px) {
            .gradient-bg {
                padding: 0.6rem;
            }
            .glass-button {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
            .form-field input {
                font-size: 0.9rem;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div class="container mx-auto p-6 max-w-md">
        <div class="glass-effect p-6">
            <h1 class="text-2xl font-bold text-white mb-6 text-center">ورود</h1>
            <form method="post" action="/login">
                <div class="mb-4 form-field">
                    <label for="username" class="block text-gray-300 mb-2">نام کاربری</label>
                    <input type="text" id="username" name="username" class="w-full p-2 rounded-lg bg-gray-800 text-white glass-effect" required>
                </div>
                <div class="mb-4 form-field">
                    <label for="password" class="block text-gray-300 mb-2">رمز عبور</label>
                    <input type="password" id="password" name="password" class="w-full p-2 rounded-lg bg-gray-800 text-white glass-effect" required>
                </div>
                <button type="submit" class="glass-button w-full">ورود</button>
            </form>
            <p class="text-gray-300 mt-4 text-center">حساب ندارید؟ <a href="/register" class="text-cyan-400 hover:underline">ثبت‌نام کنید</a></p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mt-4 p-4 text-center glass-effect {{ 'bg-green-600' if category == 'success' else 'bg-red-600' }} rounded-lg text-white form-field">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <p class="text-gray-300 mt-4 text-center">برای شروع از نو، <a href="/reset_db" class="text-red-400 hover:underline">دیتابیس را ریست کنید</a></p>
        </div>
    </div>
    <script>
        gsap.from(".container", { duration: 1, y: 50, opacity: 0, ease: "power2.out" });
    </script>
</body>
</html>
